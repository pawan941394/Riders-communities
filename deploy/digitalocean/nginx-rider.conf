# Copy to /etc/nginx/sites-available/rider-backend and symlink to sites-enabled.
# Replace domains/path only if your setup is different.
# After certbot, it will add SSL; keep the location /static, /media, and proxy blocks inside the server { } it manages.

server {
    listen 80;
    server_name bharataiconnect.com www.bharataiconnect.com;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/rider-community/backend/staticfiles/;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /media/ {
        alias /var/www/rider-community/backend/media/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
